【既往】片頭痛（10代から、月1-2回）。2年前にエコノミークラス症候群で右ふくらはぎが腫れた（DVT疑い、精査せず放置）→ 「足が腫れたことは？」「血栓は？」等と聞かれたら答える。
【ないもの】明らかな発熱なし（微熱程度）、外傷なし、手術歴なし
【この患者固有のルール】
- ピルの服用は「薬は飲んでますか？」「ホルモン剤は？」等と聞かれて初めて答える
- DVTエピソードは「血栓」「足が腫れた」等の話題で聞かれたら答える
- 頭痛が「いつもの片頭痛とは全然違う」ことを強調（「こんなのは初めてです」）
- 痙攣については同僚から聞いた話として答える（本人は覚えていない）`,
  },
];

/* ============================================================
   API CALL
   ============================================================ */
const callClaude = async (systemPrompt, messages) => {
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': API_KEY,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true',
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 300,
      system: systemPrompt,
      messages,
    }),
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error?.message || `API Error ${res.status}`);
  }
  const data = await res.json();
  return data.content[0].text;
};

/* ============================================================
   GAME MASTER LOGIC
   ============================================================ */
const EXAM_KW = ['診察','身体所見','フィジカル','バイタル','神経診察','理学所見','触診','聴診','打診','視診','眼底'];
const LAB_KW = ['検査','オーダー','CT','MRI','MRV','CK','抗体','髄液','筋電図','EMG','血液','MIBG','DAT','神経伝導','脳波','骨盤','卵巣','反復刺激','採血','腰椎穿刺','ルンバール','SPECT','心筋シンチ','画像','エコー','超音波','脳脊髄液','CSF','EEG','NCS','電気生理','婦人科','腹部','VEP','誘発電位','タップテスト','Dダイマー','凝固'];

function isExamRequest(msg) { return EXAM_KW.some(k => msg.includes(k)); }
function isLabRequest(msg) { return LAB_KW.some(k => msg.includes(k)); }

function getLabResults(scenario, msg) {
  const msgL = msg.toLowerCase();
  const matched = [];
  for (const lab of scenario.labResults) {
    if (lab.triggers.some(t => msg.includes(t) || msgL.includes(t.toLowerCase()))) {
      matched.push(lab.result);
    }
  }
  if (matched.length === 0) {
    const generic = ['検査','オーダー','血液','採血'];
    if (generic.some(g => msg.includes(g))) {
      const blood = scenario.labResults.find(l => l.triggers.some(t => ['血液','採血','血清','抗体'].includes(t)));
      if (blood) matched.push(blood.result);
    }
  }
  if (matched.length === 0) {
    return '該当する検査結果はありません。\n具体的な検査名を指定してください（例：血液検査、MRI、髄液検査、神経伝導検査 等）';
  }
  return matched.join('\n\n');
}

/* ============================================================
   SCORING（正解3pt + 必要検査 各1pt）
   ============================================================ */
const TEST_SYNONYMS = {
  '髄液': ['髄液','腰椎穿刺','ルンバール','CSF','タップテスト','脳脊髄液'],
  'MRI': ['MRI','MRV'],
  '筋電図': ['筋電図','EMG','電気生理'],
  '血液': ['血液','採血','Dダイマー','凝固'],
  '抗体': ['抗体','自己抗体'],
  'CT': ['CT'],
  '反復刺激': ['反復刺激'],
  'DAT': ['DAT','SPECT','ダット','ドパミン'],
  '骨盤': ['骨盤','卵巣','婦人科'],
  '神経伝導': ['神経伝導','NCS'],
  '脳波': ['脳波','EEG'],
  '誘発電位': ['誘発電位','VEP'],
};

const calculateScore = (scenario, diagnosis, testsOrdered) => {
  let score = 0;
  const feedback = [];
  const dL = diagnosis.toLowerCase();

  const correct =
    (scenario.diagnosis === '重症筋無力症' && (dL.includes('筋無力') || dL.includes('mg') || dL.includes('myasthenia'))) ||
    (scenario.diagnosis === 'パーキンソン病' && (dL.includes('パーキンソン') || dL.includes('parkinson'))) ||
    (scenario.diagnosis === 'Guillain-Barré症候群' && (dL.includes('guillain') || dL.includes('gbs') || dL.includes('ギラン') || dL.includes('ギランバレー'))) ||
    (scenario.diagnosis === '抗NMDA受容体脳炎' && (dL.includes('nmda') || dL.includes('抗nmda') || dL.includes('脳炎'))) ||
    (scenario.diagnosis === '多発性硬化症' && (dL.includes('多発性硬化') || dL.includes('ms') || dL.includes('multiple sclerosis'))) ||
    (scenario.diagnosis === '筋萎縮性側索硬化症' && (dL.includes('als') || dL.includes('筋萎縮性側索') || dL.includes('amyotrophic'))) ||
    (scenario.diagnosis === '特発性正常圧水頭症' && (dL.includes('正常圧水頭') || dL.includes('nph') || dL.includes('水頭症'))) ||
    (scenario.diagnosis === '脳静脈洞血栓症' && (dL.includes('静脈洞血栓') || dL.includes('cvst') || dL.includes('静脈血栓')));

  if (correct) { score += 3; feedback.push({ ok: true, text: '正解診断 +3' }); }
  else { feedback.push({ ok: false, text: `正解は「${scenario.diagnosis}」` }); }

  scenario.requiredTests.forEach(t => {
    const synonyms = TEST_SYNONYMS[t] || [t];
    const matched = testsOrdered.some(o => {
      const ol = o.toLowerCase();
      return synonyms.some(s => ol.includes(s.toLowerCase()));
    });
    if (matched) { score += 1; feedback.push({ ok: true, text: `検査: ${t} +1` }); }
    else { feedback.push({ ok: false, text: `未検査: ${t}` }); }
  });

  return { score, maxScore: scenario.maxScore, feedback, isCorrect: correct };
};

/* ============================================================
   QR CODE COMPONENT
   ============================================================ */
function QRCodeDisplay() {
  const ref = useRef(null);
  const [url, setUrl] = useState('');

  useEffect(() => {
    const currentUrl = window.location.href;
    setUrl(currentUrl);
    if (!ref.current || typeof window.qrcode !== 'function') return;
    try {
      const qr = window.qrcode(0, 'M');
      qr.addData(currentUrl);
      qr.make();
      const count = qr.getModuleCount();
      const cell = 3;
      const margin = 8;
      const size = count * cell + margin * 2;
      let svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">`;
      svg += `<rect width="${size}" height="${size}" fill="#1e293b" rx="6"/>`;
      for (let r = 0; r < count; r++) {
        for (let c = 0; c < count; c++) {
          if (qr.isDark(r, c)) {
            svg += `<rect x="${c * cell + margin}" y="${r * cell + margin}" width="${cell}" height="${cell}" fill="#e2e8f0"/>`;
          }
        }
      }
      svg += '</svg>';
      ref.current.innerHTML = svg;
    } catch (e) { /* QR generation failed, just hide */ }
  }, []);

  return (
    <div style={{ textAlign: 'center', padding: '16px 0 8px' }}>
      <div style={{ fontSize: 12, color: '#64748b', marginBottom: 8 }}>QRコードでアクセス</div>
      <div ref={ref} style={{ display: 'flex', justifyContent: 'center' }} />
      {url.startsWith('http') && (
        <div style={{ fontSize: 10, color: '#475569', marginTop: 6, wordBreak: 'break-all', maxWidth: 300, margin: '6px auto 0' }}>{url}</div>
      )}
    </div>
  );
}

  return (
    <div className="screen">
      <div className="card slide-up" style={{ textAlign: 'center' }}>
        <h2 style={{ color: result.isCorrect ? '#4ade80' : '#f87171', fontSize: 20, fontWeight: 800, marginBottom: 16 }}>
          {result.isCorrect ? '"Patient is saved."' : '"Interesting theory."'}

        <div className="score-reveal" style={{ marginBottom: 4 }}>

function PlayScreen({ scenario, onDone, onMenu }) {
  const [msgs, setMsgs] = useState([
    { type: 'system', text: `【${scenario.id}】${'★'.repeat(scenario.difficulty)}  満点${scenario.maxScore}点\n問診 →「診察」で身体所見 →「○○検査」で検査結果 → "Done it." で診断提出` },
    { type: 'patient', text: scenario.presentation },
  ]);
  const [history, setHistory] = useState([]);
  const [input, setInput] = useState('');
  const [tests, setTests] = useState([]);
  const [qCount, setQCount] = useState(0);
  const [examDone, setExamDone] = useState(false);
  const [loading, setLoading] = useState(false);
  const endRef = useRef(null);
  const inputRef = useRef(null);

  // Mutable game state for send() closure (avoids stale reads)
  const gs = useRef({ examDone: false, hints: {}, prc: 0, tests: [], qCount: 0 });

  const fullSystemPrompt = COMMON_SYSTEM_PROMPT + scenario.patientProfile;

  useEffect(() => { endRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [msgs]);
  useEffect(() => { if (!loading) inputRef.current?.focus(); }, [loading, msgs]);

  const send = async () => {
    if (!input.trim() || loading) return;
    const msg = input.trim();
    setInput('');

    if (msg.toLowerCase().includes('done it')) {
      setMsgs(p => [...p, { type: 'user', text: msg }]);
      setTimeout(() => onDone(gs.current.qCount, gs.current.tests), 300);
      return;
    }

    gs.current.qCount++;
    setQCount(gs.current.qCount);
    setMsgs(p => [...p, { type: 'user', text: msg }]);

    const examReq = isExamRequest(msg);
    const labReq = !examReq && isLabRequest(msg);

    if (examReq) {
      gs.current.examDone = true;
      setExamDone(true);
      const add = [{ type: 'exam', text: scenario.examFindings }];
      if (!gs.current.hints.lab) {
        gs.current.hints.lab = true;
        add.push({ type: 'gm', text: '検査をオーダーできます。具体的な検査名を入力してください。\n（例：血液検査、MRI、髄液検査、神経伝導検査 等）' });
      }
      setMsgs(p => [...p, ...add]);
      setHistory(h => [...h, { role: 'user', content: msg }, { role: 'assistant', content: 'はい、お願いします。' }]);
      return;
    }

    if (labReq) {
      gs.current.tests = [...gs.current.tests, msg];
      setTests(gs.current.tests);
      const labText = getLabResults(scenario, msg);
      const add = [{ type: 'lab', text: labText }];
      if (gs.current.tests.length >= 2 && !gs.current.hints.done) {
        gs.current.hints.done = true;
        add.push({ type: 'gm', text: '診断の準備ができたら "Done it." と入力してください。\n追加の問診・検査も可能です。' });
      }
      setMsgs(p => [...p, ...add]);
      setHistory(h => [...h, { role: 'user', content: msg }, { role: 'assistant', content: 'はい、お願いします。' }]);
      return;
    }

    // AI patient response
    setLoading(true);
    try {
      const newH = [...history, { role: 'user', content: msg }];
      const res = await callClaude(fullSystemPrompt, newH);
      setHistory([...newH, { role: 'assistant', content: res }]);
      gs.current.prc++;
      const add = [{ type: 'patient', text: res }];
      if (gs.current.prc >= 4 && !gs.current.examDone && !gs.current.hints.exam) {
        gs.current.hints.exam = true;
        add.push({ type: 'gm', text: '身体診察も行えます。「診察」「身体所見」等と入力してください。' });
      }
      setMsgs(p => [...p, ...add]);
    } catch (e) {
      setMsgs(p => [...p, { type: 'error', text: e.message }]);
    }
    setLoading(false);
  };

  const labelMap = {
    patient: ['🏥','患者','#94a3b8'],
    exam: ['📋','身体所見（GM）','#4ade80'],
    lab: ['🔬','検査結果（GM）','#facc15'],
    gm: ['💡','GM','#c084fc'],
    error: ['⚠','エラー','#f87171'],
  };

  return (
    <div className="chat-wrap">
      <div className="chat-header">
        <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
          <button onClick={onMenu} className="nav-btn" style={{ color: '#94a3b8', padding: '4px 0' }}>← メニュー</button>
          <span style={{ color: '#334155' }}>|</span>
          <span style={{ color: '#60a5fa', fontFamily: 'monospace', fontSize: 13 }}>{scenario.id}</span>
        </div>
        <div style={{ display: 'flex', alignItems: 'center', gap: 10, fontSize: 12, color: '#64748b' }}>
          {examDone && <span style={{ color: '#4ade80', fontSize: 11 }}>診察✓</span>}
          <span>Q:{qCount}</span>
          <span>T:{tests.length}</span>
        </div>
      </div>

      <div className="chat-body">
        {msgs.map((m, i) => {
          const label = labelMap[m.type];
          if (m.type === 'gm') {
            return <div key={i} className="msg msg-gm fade-in">{label[0]} {m.text}</div>;
          }
          return (
            <div key={i} className={`msg msg-${m.type}`}>
              {label && <div className="msg-label" style={{ color: label[2] }}>{label[0]} {label[1]}</div>}
              {m.text}
            </div>
          );
        })}
        {loading && (
          <div className="msg msg-patient">
            <div className="msg-label" style={{ color: '#94a3b8' }}>🏥 患者</div>
            <span style={{ color: '#94a3b8' }}>考え中<span className="dot">.</span><span className="dot">.</span><span className="dot">.</span></span>
          </div>
        )}
        <div ref={endRef} />
      </div>

      <div className="chat-footer">
        <div style={{ display: 'flex', gap: 8 }}>
          <input
            ref={inputRef}
            value={input}
            onChange={e => setInput(e.target.value)}
            onKeyDown={e => { if (e.key === 'Enter' && !e.isComposing && !e.nativeEvent.isComposing) send(); }}
            placeholder={'問診を入力…（"Done it." で診断提出）'}
            disabled={loading}
            style={{ flex: 1 }}
          />
          <button className="btn btn-blue btn-sm" onClick={send} disabled={loading}>送信</button>
        </div>
      </div>
    </div>
  );
}

/* ============================================================
   MAIN APP
   ============================================================ */
function App() {
  const [view, setView] = useState('menu');
  const [scenario, setScenario] = useState(null);
  const [gameId, setGameId] = useState(0);
  const [playData, setPlayData] = useState({ qCount: 0, tests: [] });
  const [result, setResult] = useState(null);
  const [diagDraft, setDiagDraft] = useState('');

  const startGame = (id = null) => {
    const s = id ? scenarios.find(x => x.id === id) : scenarios[Math.floor(Math.random() * scenarios.length)];
    setScenario(s);
    setResult(null);
    setDiagDraft('');
    setGameId(g => g + 1);
    setView('play');
  };

  if (view === 'menu') return <MenuScreen onStart={startGame} onRandom={() => startGame()} />;

  if (view === 'result') {
    return <ResultScreen result={result} scenario={scenario} onNext={() => startGame()} onMenu={() => setView('menu')} />;
  }

  // play or diag: PlayScreen stays mounted, DiagScreen overlays
  return (
    <div style={{ height: '100%' }}>
      <PlayScreen
        key={scenario.id + '-' + gameId}
        scenario={scenario}
        onDone={(qCount, tests) => { setPlayData({ qCount, tests }); setDiagDraft(''); setView('diag'); }}
        onMenu={() => setView('menu')}
      />
      {view === 'diag' && (
        <div className="overlay">
          <DiagScreen
            draft={diagDraft}
            setDraft={setDiagDraft}
            onSubmit={(diag) => {
              setResult({ ...calculateScore(scenario, diag, playData.tests), qCount: playData.qCount });
              setView('result');
            }}
            onBack={() => setView('play')}
            onMenu={() => setView('menu')}
          />
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
